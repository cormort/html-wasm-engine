<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>HTML Editor Ultimate · Pro (Rust Wasm Enhanced)</title>
  
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/theme/material.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/theme/dracula.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header-bar">
    <div class="brand">
      <a href="javascript:App.repair()" class="muted" style="margin-left: 20px; font-size: 0.7rem; text-decoration: none;">⚙️ 重設暫存</a>
    </div>
    <div class="controls">
      <div class="status"><span id="save-status"></span></div>
      <select id="engine-select">
        <option value="codemirror">CodeMirror</option>
        <option value="monaco">Monaco</option>
      </select>
      <select id="theme-select">
        <option value="default">Light</option>
        <option value="material">Material</option>
        <option value="dracula">Dracula</option>
      </select>
      <button id="btn-toggle-nav" class="btn chip">📂 導覽</button>
      <button id="btn-toggle-preview" class="btn chip">👁️ 預覽</button>
      <button id="btn-format" class="btn action">美化</button>
      <button id="btn-download" class="btn action">下載</button>
      <button id="btn-clear" class="btn danger">清空</button>
    </div>
  </header>

  <section class="tabs-bar">
    <div id="tabs" class="tabs"></div>
    <div class="tabs-actions">
      <button id="btn-new-tab" class="btn action">＋ 新增檔案</button>
    </div>
  </section>

  <main class="main-content" id="grid">
    <aside class="pane" id="pane-nav">
      <div class="pane-header">
        <span class="pane-title">結構導覽</span>
        <select id="nav-filter">
          <option value="all">全部</option>
          <option value="headings">標題</option>
          <option value="ids">精準 ID</option>
          <option value="classes">精準 Class</option>
          <option value="containers">容器元件</option>
        </select>
        <button id="btn-refresh-outline" class="btn chip">⟳</button>
      </div>
      <div id="outline-container"></div>
    </aside>

    <div class="resizer" data-target="pane-nav"></div>

    <section class="pane" id="pane-editor">
      <div class="pane-header">
        <span class="pane-title">原始碼</span>
        <div class="btn-group">
          <button id="btn-extract-css" class="btn chip">🦀 CSS</button>
          <button id="btn-extract-js" class="btn chip">🦀 JS</button>
          <button id="btn-extract-func" class="btn chip" style="border-color: #ffd54f; color: #ffd54f;">🦀 萃取函式</button>
          <button id="btn-extract-body" class="btn chip">🦀 UI</button>
          <button id="btn-ai" class="btn magic">🪄 智能替換</button>
        </div>
      </div>
      <div id="editor-host">
        <textarea id="cm-textarea"></textarea>
      </div>
    </section>

    <div class="resizer" data-target="pane-editor"></div>

    <section class="pane" id="pane-preview">
      <div class="pane-header">
        <span class="pane-title">預覽</span>
        <label><input type="checkbox" id="md-toggle" /> Markdown</label>
      </div>
      <iframe id="preview" sandbox="allow-scripts allow-modals"></iframe>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <div id="ai-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">🪄 AI 智慧程式碼替換</div>
      <p class="muted">貼上 <b>JS function</b> 或 <b>CSS 區塊</b>，系統將精準替換目標。</p>
      <textarea id="ai-input" class="modal-textarea" placeholder="例如：function update() { ... }"></textarea>
      <div class="modal-footer">
        <button id="btn-ai-cancel" class="btn">取消</button>
        <button id="btn-ai-replace" class="btn magic">自動替換</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.7/beautify-html.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/acorn@8/dist/acorn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/acorn-walk@8/dist/walk.min.js"></script>
  <script>window.__MONACO_BASE__ = 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/';</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>

  <script src="editor.js"></script>

  <script type="module">
    import init, { extract_structure, extract_functions, get_dom_outline } from './pkg/html_wasm_engine.js?v=final';
    async function loadRustEngine() {
      try {
        await init();
        window.WasmEngine = { extract_structure, extract_functions, get_dom_outline };
        console.log("🚀 Rust Wasm Engine Ready");
      } catch (e) { console.error("Rust Error:", e); }
    }
    loadRustEngine();
  </script>
</body>
</html>
